name: Backend CI

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

jobs:
  lint:
    name: Lint & Static Checks

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Imports
        run: |
          python -m compileall app

      - name: Black Formatting Check
        run: |
          black --check app tests

      - name: Ruff Lint
        run: |
          ruff check app tests

  test:
    name: Run Test Suite

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Alembic Configuration
        run: |
          alembic current

      - name: Verify FastAPI Application
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Verify Database Connection
        run: |
          python -c "from app.core.database import engine; conn = engine.connect(); conn.close(); print('Database OK')"

      - name: Verify Docker Components
        run: |
          python -c "from app.docker.docker_manager import DockerManager; print('Docker module OK')"

      - name: Verify Monitoring Modules
        run: |
          python -c "from app.api.health import router"
          python -c "from app.api.metrics import router"

      - name: Run Tests
        run: |
          mkdir -p test-results
          pytest -q --junitxml=test-results/pytest-report.xml

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: backend/test-results/pytest-report.xml